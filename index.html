<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI Pro | Dashboard TIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #0f172a; }
        .bg-card-custom { background-color: #1e293b; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col md:flex-row">

    <aside class="hidden w-64 bg-card-custom border-r border-slate-700 md:flex flex-col p-6 space-y-8 h-screen sticky top-0">
        <h2 class="text-[#38bdf8] font-black text-lg">SGI PRO | TIC</h2>
        <nav class="space-y-3">
            <button onclick="cambiarTab('home')" class="w-full text-left p-3 rounded-lg bg-[#38bdf8]/10 text-[#38bdf8] font-bold">🏠 Dashboard</button>
            <button onclick="cambiarTab('inventario')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800">📦 Inventario</button>
            <button onclick="cambiarTab('reportes')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800">📊 Reportes</button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <section id="sec-home" class="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
            <div class="bg-card-custom p-6 rounded-2xl border border-slate-700">
                <h2 class="font-bold text-[#38bdf8] mb-4">✅ Checklist Diario</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="nueva-tarea" class="flex-1 bg-[#0f172a] border border-slate-600 rounded-lg p-2 text-sm" placeholder="Tarea...">
                    <button onclick="agregarTarea()" class="bg-[#38bdf8] text-[#0f172a] px-4 rounded-lg font-bold">+</button>
                </div>
                <div id="lista-checklist" class="space-y-2"></div>
            </div>

            <div class="bg-card-custom p-6 rounded-2xl border border-slate-700">
                <h2 class="font-bold text-amber-400 mb-4">⚠️ Alertas de Mantenimiento</h2>
                <div id="lista-alertas" class="text-sm space-y-2"></div>
            </div>
        </section>

        <section id="sec-inventario" class="hidden fade-in space-y-6">
            <div class="bg-card-custom p-6 rounded-2xl border border-slate-700">
                <h2 class="font-bold text-white mb-4">Registrar Equipo</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="inv-id" placeholder="Nombre (Ej: PC-01)" class="bg-[#0f172a] border border-slate-600 p-2 rounded-lg text-sm">
                    <input type="date" id="inv-fecha" class="bg-[#0f172a] border border-slate-600 p-2 rounded-lg text-sm">
                    <button onclick="agregarEquipo()" class="bg-[#38bdf8] text-[#0f172a] font-bold rounded-lg">Guardar Equipo</button>
                </div>
            </div>
            <div id="lista-equipos" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <script>
        // --- BASE DE DATOS Y ESTADO ---
        let inventario = JSON.parse(localStorage.getItem('sgi_inv')) || [];
        let tareas = JSON.parse(localStorage.getItem('sgi_tareas')) || ['Verificar conexión'];

        // --- FUNCIONES CHECKLIST ---
        function agregarTarea() {
            const t = document.getElementById('nueva-tarea').value;
            if(t) { tareas.push(t); localStorage.setItem('sgi_tareas', JSON.stringify(tareas)); renderChecklist(); }
        }

        function renderChecklist() {
            document.getElementById('lista-checklist').innerHTML = tareas.map((t, i) => `
                <div class="flex justify-between bg-[#0f172a] p-2 rounded text-sm text-slate-300">
                    ${t} <button onclick="tareas.splice(${i},1); renderChecklist();" class="text-red-400">✕</button>
                </div>
            `).join('');
        }

        // --- FUNCIONES INVENTARIO Y ALERTAS ---
        function agregarEquipo() {
            const id = document.getElementById('inv-id').value;
            const fecha = document.getElementById('inv-fecha').value;
            inventario.push({ id, fecha });
            localStorage.setItem('sgi_inv', JSON.stringify(inventario));
            renderInventario();
        }

        function renderInventario() {
            const lista = document.getElementById('lista-equipos');
            const alertas = document.getElementById('lista-alertas');
            lista.innerHTML = '';
            alertas.innerHTML = '';

            inventario.forEach((eq, i) => {
                const esViejo = (new Date() - new Date(eq.fecha)) / (1000*60*60*24) > 90;
                
                // Tarjetas
                lista.innerHTML += `
                    <div class="bg-card-custom p-4 rounded-xl border ${esViejo ? 'border-amber-500' : 'border-slate-700'}">
                        <h3 class="font-bold">${eq.id}</h3>
                        <p class="text-xs text-slate-400">Último mtto: ${eq.fecha}</p>
                        <button onclick="inventario.splice(${i},1); renderInventario();" class="text-red-400 text-xs mt-2">Eliminar</button>
                    </div>
                `;

                // Alerta en el dashboard
                if(esViejo) {
                    alertas.innerHTML += `<div class="p-2 bg-amber-500/10 border border-amber-500/50 rounded text-amber-200">⚠️ ${eq.id} requiere mantenimiento!</div>`;
                }
            });
        }

        function cambiarTab(tab) {
            document.getElementById('sec-home').classList.add('hidden');
            document.getElementById('sec-inventario').classList.add('hidden');
            document.getElementById('sec-' + tab).classList.remove('hidden');
        }

        // Inicializar
        renderChecklist();
        renderInventario();
    </script>
</body>
</html>
</html></body>
</html>
