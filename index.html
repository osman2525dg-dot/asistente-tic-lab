<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI - Dashboard TIC & Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #0f172a; scroll-behavior: smooth; }
        .bg-card-custom { background-color: #1e293b; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col md:flex-row overflow-hidden">
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>
    
    <!-- PANTALLA DE LOGUEO -->
    <div id="login-page" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a] p-4 backdrop-blur-sm bg-opacity-90">
        <div class="w-full max-w-md bg-card-custom p-8 rounded-2xl border border-slate-700 shadow-[0_0_40px_rgba(56,189,248,0.15)] fade-in">
            <h2 class="text-2xl font-bold text-[#38bdf8] text-center mb-1">SGI Tecnológico</h2>
            <div id="login-error" class="hidden bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-4 text-xs text-center font-medium">Credenciales incorrectas.</div>
            <div class="space-y-4">
                <input type="text" id="input-user" class="w-full bg-[#0f172a] border border-slate-600 rounded-lg p-3 text-slate-100" placeholder="Usuario">
                <input type="password" id="input-pass" class="w-full bg-[#0f172a] border border-slate-600 rounded-lg p-3 text-slate-100" placeholder="Contraseña">
                <button onclick="intentarLogin()" class="w-full bg-gradient-to-r from-[#0284c7] to-[#38bdf8] text-white font-bold py-3 rounded-lg">Ingresar al Sistema</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="hidden w-64 bg-card-custom border-r border-slate-700 md:flex flex-col justify-between h-screen sticky top-0">
        <div class="p-6 space-y-8">
            <h2 class="font-black text-lg text-[#38bdf8]">Panel TIC</h2>
            <nav class="space-y-3">
                <button onclick="cambiarTab('inventario')" class="w-full p-3.5 rounded-xl bg-[#38bdf8] text-[#0f172a] font-bold text-sm">Inventario Dinámico</button>
                <button onclick="cambiarTab('reportes')" class="w-full p-3.5 rounded-xl text-slate-300 font-bold text-sm">Informes Técnicos</button>
                <button onclick="cambiarTab('wiki')" class="w-full p-3.5 rounded-xl text-slate-300 font-bold text-sm">Base de Conocimiento</button>
                <button onclick="cambiarTab('config')" class="w-full p-3.5 rounded-xl text-slate-300 font-bold text-sm">Configuración</button>
            </nav>
        </div>
        <button onclick="logout()" class="p-6 text-red-400 text-xs">Cerrar Sesión</button>
    </aside>

    <!-- CONTENIDO -->
    <main class="flex-1 p-8 overflow-y-auto h-screen">
        <section id="sec-inventario" class="space-y-6">
            <h1 class="text-3xl font-black">Inventario de Hardware</h1>
            <div class="bg-card-custom p-5 rounded-xl border border-slate-700 grid grid-cols-4 gap-4">
                <input type="text" id="inv-id" placeholder="ID" class="bg-[#0f172a] border border-slate-600 p-2 rounded">
                <select id="inv-tipo" class="bg-[#0f172a] border border-slate-600 p-2"><option>Computadora</option><option>Laptop</option></select>
                <input type="text" id="inv-ip" placeholder="IP" class="bg-[#0f172a] border border-slate-600 p-2">
                <button onclick="agregarEquipo()" class="bg-[#38bdf8] text-[#0f172a] font-bold rounded">Añadir</button>
            </div>
            <div id="lista-equipos" class="grid grid-cols-3 gap-4"></div>
        </section>
    </main>

    <script>
        // --- CONFIGURACIÓN NUBE ---
        const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // REEMPLAZA ESTO
        let inventarioHardware = JSON.parse(localStorage.getItem('sgi_inventario')) || [];

        // Función Maestra de Sincronización
        async function sincronizarConNube(datos) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'guardar', data: datos })
                });
                mostrarToast("Sincronizado con la Nube");
            } catch(e) {
                mostrarToast("Guardado local (Sin conexión a nube)", "error");
            }
        }

        function agregarEquipo() {
            const id = document.getElementById('inv-id').value;
            inventarioHardware.push({ id, estado: 'operativa' });
            localStorage.setItem('sgi_inventario', JSON.stringify(inventarioHardware));
            sincronizarConNube(inventarioHardware); // <--- AQUI SE CONECTA
            renderizarInventario();
        }

        function intentarLogin() {
            sessionStorage.setItem('session_active', 'true');
            document.getElementById('login-page').classList.add('hidden');
        }

        function renderizarInventario() {
            document.getElementById('lista-equipos').innerHTML = inventarioHardware.map(eq => `
                <div class="bg-card-custom p-4 rounded border border-slate-700">${eq.id}</div>
            `).join('');
        }

        function mostrarToast(msg, tipo = 'exito') { /* Tu lógica de toast original */ }
        window.onload = () => { if(sessionStorage.getItem('session_active')) renderizarInventario(); };
    </script>
</body>
</html>
