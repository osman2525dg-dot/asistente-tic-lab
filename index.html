<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Integral</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a5f7a; margin-bottom: 10px; }
        p { color: #555; font-size: 1.1em; }
        .badge { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Gestión Integral</h1>
        <div class="badge">Área Tecnológica & Biblioteca</div>
        <p>Panel centralizado para el control de infraestructura, inventario y recursos del espacio.</p>
    </div>
</body>
</html>
