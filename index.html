<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI - Dashboard TIC & Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #0f172a; scroll-behavior: smooth; }
        .bg-card-custom { background-color: #1e293b; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- SECCIÓN 2: REPORTES Y PDF (INTEGRADA) -->
    <main class="flex-1 p-4 md:p-8 w-full overflow-y-auto h-screen">
        <section id="sec-reportes" class="space-y-6 fade-in max-w-5xl mx-auto">
            <div class="border-b border-slate-700 pb-4">
                <h1 class="text-2xl md:text-3xl font-black text-white">Informes Técnicos</h1>
            </div>

            <!-- HISTORIAL CON BOTÓN DE ELIMINAR -->
            <div class="space-y-4">
                <h4 class="text-sm font-bold text-slate-300 flex items-center gap-2">📂 Registros Recientes</h4>
                <div id="lista-reportes" class="grid grid-cols-1 lg:grid-cols-2 gap-5"></div>
            </div>
        </section>
    </main>

    <script>
        // --- BASE DE DATOS ---
        let reportes = JSON.parse(localStorage.getItem('tic_reportes')) || [];

        // --- FUNCIÓN RENDERIZAR REPORTES ---
        function renderizarReportes() {
            const lista = document.getElementById('lista-reportes');
            if (reportes.length === 0) {
                lista.innerHTML = '<p class="text-xs text-slate-500">Sin reportes generados.</p>';
                return;
            }
            
            lista.innerHTML = reportes.map((r, i) => `
                <div class="bg-card-custom p-4 rounded-xl border border-slate-700 flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-white">${r.id || 'Sin ID'}</h3>
                        <p class="text-xs text-slate-400 mt-1">${r.desc || 'Sin descripción'}</p>
                    </div>
                    <button onclick="eliminarReporte(${i})" class="text-red-400 hover:text-red-600 text-xs font-bold px-2 py-1 border border-red-500/30 rounded transition">
                        Eliminar
                    </button>
                </div>
            `).join('');
        }

        // --- FUNCIÓN ELIMINAR (MODIFICACIÓN) ---
        function eliminarReporte(index) {
            if(confirm("¿Estás seguro de eliminar este registro?")) {
                reportes.splice(index, 1);
                localStorage.setItem('tic_reportes', JSON.stringify(reportes));
                renderizarReportes();
            }
        }

        // Inicialización
        renderizarReportes();
    </script>
</body>
</html>
